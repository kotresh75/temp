<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaint Management - Lodge Issue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>body { font-family: 'Roboto', sans-serif; }</style>
</head>
<body class="bg-[#f4f7fa] text-[#2c3e50]">
    <div class="flex flex-col h-screen overflow-hidden">
        <header class="h-16 bg-[#2c3e50] text-white flex items-center justify-between px-6 shadow-md z-10">
            <div class="flex items-center gap-4">
                <i class="fas fa-shield-alt text-2xl text-[#e74c3c]"></i>
                <h1 class="text-xl font-bold tracking-wider">CampusResolve</h1>
            </div>
            <div class="flex items-center gap-3 pl-4 border-l border-[#34495e]">
                <div class="text-right hidden md:block">
                    <p class="text-sm font-semibold leading-tight">Student (USN: 1RV22CS091)</p>
                </div>
                <div class="h-9 w-9 bg-white text-[#2c3e50] rounded-full flex items-center justify-center font-bold">S</div>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            <aside class="w-60 bg-white border-r border-gray-200 shadow-sm flex flex-col hidden md:flex">
                <nav class="p-4 space-y-1">
                    <a href="Complaint_System_UI.html" class="flex items-center gap-3 px-3 py-2.5 text-gray-600 hover:bg-gray-50 rounded-md font-medium transition"><i class="fas fa-tachometer-alt w-5 text-center"></i> Dashboard</a>
                    <a href="Complaint_System_UI_Add.html" class="flex items-center gap-3 px-3 py-2.5 bg-[#eaf2f8] text-[#2980b9] rounded-md font-medium border-l-4 border-[#3498db]"><i class="fas fa-plus-circle w-5 text-center"></i> Raise Grievance</a>
                </nav>
            </aside>
            
            <main class="flex-1 overflow-y-auto p-10 flex justify-center items-start">
                <div class="w-full max-w-2xl bg-white rounded-lg shadow-sm border border-gray-200">
                    <div class="px-8 py-5 border-b border-gray-200 bg-[#34495e] text-white rounded-t-lg">
                        <h2 class="text-xl font-bold">Submit a Grievance</h2>
                        <p class="text-sm text-gray-300 mt-1">Please provide clear details regarding your issue.</p>
                    </div>
                    
                    <form class="p-8 space-y-6">
                        <div>
                            <label class="block text-sm font-bold text-[#2c3e50] mb-2">Subject</label>
                            <input type="text" placeholder="Brief summary of the issue (e.g., Fan not working in Room 204)" class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded focus:border-[#3498db] focus:ring-1 focus:ring-[#3498db] outline-none">
                        </div>

                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-bold text-[#2c3e50] mb-2">Concerned Department</label>
                                <select class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded focus:border-[#3498db] focus:ring-1 focus:ring-[#3498db] outline-none">
                                    <option>IT & Computer Support</option>
                                    <option>Infrastructure & Maintenance</option>
                                    <option>Hostel Warden</option>
                                    <option>Library Administration</option>
                                    <option>Accounts Department</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-[#2c3e50] mb-2">Priority Level</label>
                                <select class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded focus:border-[#3498db] focus:ring-1 focus:ring-[#3498db] outline-none">
                                    <option>Low (Can wait)</option>
                                    <option>Medium (Needs attention)</option>
                                    <option>High (Urgent resolution needed)</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-[#2c3e50] mb-2">Detailed Description</label>
                            <textarea rows="5" placeholder="Explain the exact issue, time it started, and any other relevant specifics..." class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded focus:border-[#3498db] focus:ring-1 focus:ring-[#3498db] outline-none resize-none"></textarea>
                        </div>
                        
                        <div class="pt-4 flex justify-end">
                            <button type="button" class="px-8 py-3 bg-[#e74c3c] text-white font-bold rounded hover:bg-[#c0392b] transition shadow-md shadow-red-500/20 uppercase tracking-wide text-sm">Submit Ticket</button>
                        </div>
                    </form>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
