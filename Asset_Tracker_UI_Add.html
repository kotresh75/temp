<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asset Tracker - Add Asset</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-white flex flex-col hidden md:flex">
            <div class="h-16 flex items-center px-6 border-b border-slate-800 font-bold text-xl tracking-wide">
                <i class="fas fa-boxes text-blue-500 mr-3"></i> AssetTrack Pro
            </div>
            <nav class="flex-1 px-4 py-8 space-y-2">
                <a href="Asset_Tracker_UI.html" class="flex items-center px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition-colors"><i class="fas fa-chart-pie w-6"></i> Dashboard</a>
                <a href="#" class="flex items-center px-4 py-3 bg-blue-600 text-white rounded-lg shadow-md shadow-blue-500/20"><i class="fas fa-plus-circle w-6"></i> Add Asset</a>
                <a href="#" class="flex items-center px-4 py-3 text-slate-400 hover:bg-slate-800 hover:text-white rounded-lg transition-colors"><i class="fas fa-laptop w-6"></i> Inventory</a>
            </nav>
        </aside>
        
        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-y-auto">
            <header class="h-16 bg-white border-b border-slate-200 flex items-center px-8 shadow-sm">
                <h1 class="text-2xl font-semibold text-slate-800">Register New Asset</h1>
            </header>
            
            <div class="p-8 max-w-4xl mx-auto w-full">
                <!-- Form -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-6 border-b border-slate-100 bg-slate-50/50">
                        <h2 class="text-lg font-bold text-slate-800">Asset Details</h2>
                        <p class="text-sm text-slate-500 mt-1">Please enter the correct hardware details to add into the central registry.</p>
                    </div>
                    
                    <form class="p-8 space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Asset Name / Model</label>
                                <input type="text" placeholder="e.g. Dell Inspiron 15" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Category</label>
                                <select class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition appearance-none">
                                    <option>Laptop / Computer</option>
                                    <option>Display / Monitor</option>
                                    <option>Networking Equipment</option>
                                    <option>Office Furniture</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Serial Number (SN)</label>
                                <input type="text" placeholder="e.g. SN-8921-XX" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition font-mono uppercase">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Purchase Value (₹)</label>
                                <div class="relative">
                                    <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500 font-bold">₹</span>
                                    <input type="number" placeholder="45000" class="w-full pl-8 pr-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Assign To Employee</label>
                                <select class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition appearance-none">
                                    <option>-- Unassigned (Inventory) --</option>
                                    <option>Aditi Verma (HR)</option>
                                    <option>Rahul Desai (Engineering)</option>
                                    <option>Shruti Sharma (Design)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-2">Date of Purchase</label>
                                <input type="date" value="2026-10-30" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition text-slate-700">
                            </div>
                        </div>
                        <div class="mt-8 pt-6 border-t border-slate-100 flex justify-end gap-4">
                            <button type="button" class="px-6 py-2.5 bg-white border border-slate-300 rounded-lg text-slate-700 font-medium hover:bg-slate-50 transition">Cancel</button>
                            <button type="button" class="px-6 py-2.5 bg-blue-600 rounded-lg text-white font-medium hover:bg-blue-700 transition shadow-md shadow-blue-500/20"><i class="fas fa-save mr-2"></i> Save Asset Record</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
